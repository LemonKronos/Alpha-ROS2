<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
<title>Alpha Control Minus 2 [V4]</title>
<style>
    /* === CORE UI: SCI-FI GREEN (ORIGINAL) === */
    body {
        background-color: #050505;
        color: #00ff41; /* Neon Green */
        font-family: 'Consolas', 'Courier New', monospace; /* Tech font */
        margin: 0;
        overflow: hidden;
        touch-action: none; 
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        user-select: none;
        -webkit-user-select: none;
        
        /* Subtle Grid Background */
        background-image: 
            linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
    }

    /* === LOADING OVERLAY === */
    #loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #00ff41;
        font-size: 24px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00ff41;
        font-weight: bold;
        transition: opacity 0.5s;
    }

    /* === STATUS BAR === */
    #hud-top {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 50px;
        background: linear-gradient(to bottom, rgba(0, 20, 0, 0.95), rgba(0,0,0,0));
        border-bottom: 2px solid rgba(0, 255, 65, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        padding: 0 15px;
        box-sizing: border-box;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.05);
    }

    .hud-group { display: flex; align-items: center; gap: 20px; }
    .hud-group.center { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    /* === BUTTONS === */
    .hud-btn {
        background: rgba(0, 20, 0, 0.6);
        border: 1px solid #00ff41;
        border-radius: 4px; 
        width: 40px; height: 40px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer;
        fill: #00ff41;
        box-shadow: 0 0 5px rgba(0, 255, 65, 0.1);
        transition: all 0.2s;
    }
    .hud-btn:active { 
        background: rgba(0, 255, 65, 0.2); 
        box-shadow: 0 0 15px #00ff41;
        transform: scale(0.95); 
    }
    
    #btn-record.recording {
        border-color: #ff3333; fill: #ff3333;
        background: rgba(255, 0, 0, 0.1);
        box-shadow: 0 0 10px #ff3333;
        animation: pulse 1.5s infinite;
    }
    #btn-pause.paused { fill: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
    
    /* New Style for Mode/State Button */
    #btn-mode.active {
        fill: #00f3ff;
        border-color: #00f3ff;
        box-shadow: 0 0 10px #00f3ff;
        background: rgba(0, 243, 255, 0.15);
    }

    #status-text {
        font-size: 16px; letter-spacing: 3px;
        text-shadow: 0 0 8px #00ff41; font-weight: bold;
        text-transform: uppercase;
    }

    /* === JOYSTICKS === */
    .joy-container {
        position: absolute;
        bottom: 10%; 
        height: 60vh; width: 60vh;  
        max-width: 45vw; max-height: 45vw; 
        z-index: 50;
    }
    #zone-left { left: 6vw; }
    #zone-right { right: 6vw; }

    canvas {
        width: 100%; height: 100%; display: block;
        border-radius: 50%;
        background: 
            radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 60%),
            linear-gradient(0deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%),
            linear-gradient(90deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%);
        border: 1px solid rgba(0, 255, 65, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.1) inset;
    }

    @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 10px #ff3333; } 50% { opacity: 0.6; box-shadow: 0 0 2px #ff3333; } 100% { opacity: 1; box-shadow: 0 0 10px #ff3333; } }
</style>
</head>
<body>

<div id="loader">INITIALIZING SYSTEMS...</div>

<div id="hud-top">
    <div class="hud-group left">
        <div class="hud-btn" id="btn-record"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" /></svg></div>
        <div class="hud-btn" id="btn-pause">
            <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>
            <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z" /></svg>
        </div>
    </div>
    <div class="hud-group center"><span id="status-text">WAITING...</span></div>
    <div class="hud-group right">
        <div class="hud-btn" id="btn-mode">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 2V4H5V8H3V4C3 2.9 3.9 2 5 2H9M15 2H19C20.1 2 21 2.9 21 4V8H19V4H15V2M9 20V22H5C3.9 22 3 21.1 3 20V16H5V20H9M15 20H19V16H21V20C21 21.1 20.1 22 19 22H15V20M7 10H9V12H7V10M15 10H17V12H15V10M11 14H13V16H11V14M11 8H13V10H11V8Z"/></svg>
        </div>
        <div class="hud-btn" id="btn-fs"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></div>
    </div>
</div>

<div id="zone-left" class="joy-container"><canvas id="canvasLeft"></canvas></div>
<div id="zone-right" class="joy-container"><canvas id="canvasRight"></canvas></div>

<script>
// ========================
// CONFIGURATION
// ========================
const WS_URL = "ws://10.183.21.129:8765";
const SEND_RATE_MS = 12.5; 

// Gyro Config
const GYRO_DEADZONE = 15; 
const GYRO_ACTIVE_RANGE = 45; 

// Joystick Config
const JOY_THUMB_RADIUS = 30; 
const JOY_DEADZONE_RADIUS = 40; 

// ========================
// SYSTEM BOOT
// ========================
window.addEventListener('load', () => {
    try {
        initApp();
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
    } catch (e) {
        console.error("Boot failed", e);
        document.getElementById('loader').innerText = "BOOT ERROR. RELOADING...";
        setTimeout(() => location.reload(), 1000);
    }
});

setTimeout(() => {
    if (document.getElementById('loader')) location.reload(); 
}, 3000); 

// ========================
// APP LOGIC
// ========================
let stickLeft, stickRight;
let ws;

function initApp() {
    
    // --- UI Setup ---
    const btnRecord = document.getElementById("btn-record");
    const btnPause = document.getElementById("btn-pause");
    const btnFs = document.getElementById("btn-fs");
    const btnMode = document.getElementById("btn-mode");
    
    let flags = { 
        record: false, 
        pause: false, 
        control_state: false // Default False
    };

    // Function to force update the UI status based on priority
    const updateGlobalStatus = () => {
        const statusEl = document.getElementById("status-text");
        
        // Priority 1: Connection Issues
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            statusEl.innerText = "DISCONNECTED";
            statusEl.style.color = "#ffaa00";
            return;
        }

        // Priority 2: Pause State
        if (flags.pause) {
            statusEl.innerText = "PAUSED";
            statusEl.style.color = "#ffaa00";
            return;
        }

        // Priority 3: Recording
        if (flags.record) {
            statusEl.innerText = "REC ●";
            statusEl.style.color = "#ff3333";
            return;
        }

        // Priority 4: Activity
        if (controlsActive) {
            statusEl.innerText = "ACTIVE";
            statusEl.style.color = "#00ff41";
            return;
        }

        // Priority 5: Default
        statusEl.innerText = "READY";
        statusEl.style.color = "#00f3ff";
    };

    btnRecord.addEventListener("click", () => {
        flags.record = !flags.record;
        if (flags.record) btnRecord.classList.add("recording");         
        else btnRecord.classList.remove("recording");
        updateGlobalStatus();
    });

    btnPause.addEventListener("click", () => {
        flags.pause = !flags.pause;
        if (flags.pause) {
            btnPause.classList.add("paused");
            document.getElementById("icon-pause").style.display = "none";
            document.getElementById("icon-play").style.display = "block";
        } else {
            btnPause.classList.remove("paused");
            document.getElementById("icon-pause").style.display = "block";
            document.getElementById("icon-play").style.display = "none";
        }
        updateGlobalStatus();
    });

    btnMode.addEventListener("click", () => {
        flags.control_state = !flags.control_state;
        if (flags.control_state) btnMode.classList.add("active");
        else btnMode.classList.remove("active");
        // Optional: Trigger a status update if you want the text to reflect mode
        // updateGlobalStatus(); 
    });

    btnFs.addEventListener("click", () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{});
        else if (document.exitFullscreen) document.exitFullscreen();
    });

    // --- WebSocket (Auto-Reconnect) ---
    function connect() {
        ws = new WebSocket(WS_URL);
        
        ws.onopen = () => { 
            updateGlobalStatus();
        };
        
        ws.onclose = () => { 
            updateGlobalStatus();
            setTimeout(connect, 1000);
        };
        
        ws.onerror = (e) => {
            ws.close(); 
        };
    }
    
    // Initial connection
    connect();

    // --- Joysticks ---
    const onStickActivity = (isActive) => {
        controlsActive = isActive;
        updateGlobalStatus();
    };

    stickLeft = new Joystick("canvasLeft", "rgba(255, 160, 0, 0.8)", onStickActivity);
    stickRight = new Joystick("canvasRight", "rgba(0, 240, 255, 0.8)", onStickActivity);

    // --- Loop ---
    setInterval(() => gameLoop(flags, ws), SEND_RATE_MS);
}

// ========================
// LOGIC HELPERS
// ========================
let controlsActive = false;
let gyroBase = { roll: 0, pitch: 0 };
let gyroRaw = { beta: 0, gamma: 0 };
let output = { x: 0, y: 0, z: 0, yaw: 0, roll: 0, pitch: 0 };

const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
const round = (val) => Math.round(val * 100) / 100;

function getShortestDiff(current, base) {
    let diff = current - base;
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    return diff;
}

function applyRadialDeadzone(x, y, deadzoneThreshold) {
    const mag = Math.sqrt(x*x + y*y);
    if (mag < deadzoneThreshold) {
        return { x: 0, y: 0 };
    } else {
        const activeMag = mag - deadzoneThreshold;
        const normalizedMag = activeMag / (1 - deadzoneThreshold);
        const scale = normalizedMag / mag; 
        return { x: x * scale, y: y * scale };
    }
}

window.addEventListener("deviceorientation", e => {
    gyroRaw.beta = e.beta || 0;
    gyroRaw.gamma = e.gamma || 0;
});

function activateGyro() {
    if (!controlsActive) {
        controlsActive = true;
        gyroBase.roll = gyroRaw.beta;
        gyroBase.pitch = gyroRaw.gamma;
    }
}

class Joystick {
    constructor(canvasId, color, statusCallback) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
        this.color = color;
        this.statusCallback = statusCallback;
        this.touchId = null;
        this.maxDist = 0;
        this.deadzoneRatio = 0; 

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.pos = { x: this.center, y: this.center };
        this.val = { x: 0, y: 0 }; 
        this.initEvents();
        this.draw();
    }

    resize() {
        const rect = this.canvas.getBoundingClientRect();
        if (rect.width === 0) return;
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
        this.size = rect.width;
        this.center = this.size / 2;
        this.radius = this.size / 2;
        this.maxDist = this.radius - 35; 
        this.deadzoneRatio = JOY_DEADZONE_RADIUS / this.maxDist; 
        this.pos = { x: this.center, y: this.center };
        this.draw();
    }

    initEvents() {
        const start = (e) => {
            e.preventDefault();
            activateGyro();
            if (this.touchId === null) {
                this.touchId = e.changedTouches[0].identifier;
                this.update(e.changedTouches[0]);
                this.statusCallback(true);
            }
        };
        const move = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) this.update(t);
        };
        const end = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) {
                this.touchId = null;
                this.reset();
                if (stickLeft.touchId === null && stickRight.touchId === null) {
                    this.statusCallback(false);
                }
            }
        };
        this.canvas.addEventListener("touchstart", start);
        this.canvas.addEventListener("touchmove", move);
        this.canvas.addEventListener("touchend", end);
        this.canvas.addEventListener("touchcancel", end);
    }

    update(touch) {
        const rect = this.canvas.getBoundingClientRect();
        const dx = (touch.clientX - rect.left) - this.center;
        const dy = (touch.clientY - rect.top) - this.center;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        let drawX = dx, drawY = dy;
        if (dist > this.maxDist) {
            const ratio = this.maxDist / dist;
            drawX *= ratio;
            drawY *= ratio;
        }
        this.pos.x = this.center + drawX;
        this.pos.y = this.center + drawY;
        this.val.x = drawX / this.maxDist;
        this.val.y = drawY / this.maxDist;
        this.draw(true);
    }

    reset() {
        this.pos.x = this.center;
        this.pos.y = this.center;
        this.val.x = 0;
        this.val.y = 0;
        this.draw(false);
    }

    draw(active) {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.size, this.size);
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, this.radius - 2, 0, Math.PI*2);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, JOY_DEADZONE_RADIUS, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(0, 255, 65, 0.2)"; 
        ctx.lineWidth = 1; 
        ctx.setLineDash([5, 5]); 
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, JOY_THUMB_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = active ? this.color : "#444"; ctx.fill();
        ctx.strokeStyle = active ? "#fff" : "#666"; ctx.lineWidth = 2; ctx.stroke();
    }
}

// ========================
// GAME LOOP
// ========================
function gameLoop(flags, ws) {
    
    // 1. Joystick
    const leftOut = applyRadialDeadzone(stickLeft.val.x, stickLeft.val.y, stickLeft.deadzoneRatio);
    const rightOut = applyRadialDeadzone(stickRight.val.x, stickRight.val.y, stickRight.deadzoneRatio);

    output.x = -leftOut.y;
    output.y = -leftOut.x;
    output.z = -rightOut.y;
    output.yaw = -rightOut.x;

    // 2. Gyro
    if (controlsActive) {
        let rollDiff = getShortestDiff(gyroRaw.beta, gyroBase.roll);
        let pitchDiff = getShortestDiff(gyroRaw.gamma, gyroBase.pitch);
        
        if (Math.abs(rollDiff) < GYRO_DEADZONE) {
            output.roll = 0; 
        } else {
            let activeDiff = Math.abs(rollDiff) - GYRO_DEADZONE;
            output.roll = Math.sign(rollDiff) * (activeDiff / GYRO_ACTIVE_RANGE);
        }

        if (Math.abs(pitchDiff) < GYRO_DEADZONE) {
            output.pitch = 0; 
        } else {
            let activeDiff = Math.abs(pitchDiff) - GYRO_DEADZONE;
            output.pitch = Math.sign(pitchDiff) * (activeDiff / GYRO_ACTIVE_RANGE);
        }

        output.roll = clamp(output.roll, -1, 1);
        output.pitch = clamp(output.pitch, -1, 1);
    } else {
        output.roll = 0;
        output.pitch = 0;
    }

    // 3. Send Data (Include control_state)
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            x: round(output.x),
            y: round(output.y),
            z: round(output.z),
            yaw: round(output.yaw),
            roll: round(output.roll),
            pitch: round(output.pitch),
            record: flags.record,
            pause: flags.pause,
            control_state: flags.control_state
        }));
    }
}
</script>
</body>
</html>
