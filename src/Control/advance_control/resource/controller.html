<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
<title>Alpha Control Minus 2 [V15 Startfield]</title>
<style>
    /* === CORE UI: SCI-FI GREEN === */
    body {
        background-color: #050505;
        color: #00ff41; /* Neon Green */
        font-family: 'Consolas', 'Courier New', monospace;
        margin: 0;
        overflow: hidden;
        touch-action: none; 
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        user-select: none;
        -webkit-user-select: none;
        
        /* Subtle Grid Background */
        background-image: 
            linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
    }

    /* === LOADING OVERLAY === */
    #loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #00ff41;
        font-size: 24px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00ff41;
        font-weight: bold;
        transition: opacity 0.5s;
    }

    /* === STATUS BAR === */
    #hud-top {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 50px;
        background: linear-gradient(to bottom, rgba(0, 20, 0, 0.95), rgba(0,0,0,0));
        border-bottom: 2px solid rgba(0, 255, 65, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        padding: 0 15px;
        box-sizing: border-box;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.05);
    }

    .hud-group { display: flex; align-items: center; gap: 20px; }
    .hud-group.center { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    /* === BUTTONS === */
    .hud-btn {
        background: rgba(0, 20, 0, 0.6);
        border: 1px solid #00ff41;
        border-radius: 4px; 
        width: 40px; height: 40px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer;
        fill: #00ff41;
        box-shadow: 0 0 5px rgba(0, 255, 65, 0.1);
        transition: all 0.1s; 
        pointer-events: auto; 
        -webkit-tap-highlight-color: transparent;
    }
    
    .hud-btn.btn-active, .hud-btn:active { 
        background: rgba(0, 255, 65, 0.3); 
        box-shadow: 0 0 15px #00ff41;
        transform: scale(0.95); 
        border-color: #fff;
        fill: #fff;
    }
    
    #btn-record.recording {
        border-color: #ff3333; fill: #ff3333;
        background: rgba(255, 0, 0, 0.1);
        box-shadow: 0 0 10px #ff3333;
        animation: pulse 1.5s infinite;
    }
    #btn-pause.paused { fill: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
    
    /* ARMED STATE (BLUE) */
    #btn-mode.active {
        fill: #00f3ff !important;
        border-color: #00f3ff !important;
        box-shadow: 0 0 10px #00f3ff !important;
        background: rgba(0, 243, 255, 0.15) !important;
    }

    #status-text {
        font-size: 16px; letter-spacing: 3px;
        text-shadow: 0 0 8px #00ff41; font-weight: bold;
        text-transform: uppercase;
    }

    /* === FLIGHT HUD (Background Layer) === */
    #hud-display {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 10; 
        pointer-events: none; 
    }

    /* === JOYSTICKS === */
    .joy-container {
        position: absolute;
        bottom: 10%; 
        height: 60vh; width: 60vh;  
        max-width: 45vw; max-height: 45vw; 
        z-index: 50;
    }
    #zone-left { left: 6vw; }
    #zone-right { right: 6vw; }

    canvas.joy-canvas {
        width: 100%; height: 100%; display: block;
        border-radius: 50%;
        background: 
            radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 60%),
            linear-gradient(0deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%),
            linear-gradient(90deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%);
        border: 1px solid rgba(0, 255, 65, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.1) inset;
    }

    @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 10px #ff3333; } 50% { opacity: 0.6; box-shadow: 0 0 2px #ff3333; } 100% { opacity: 1; box-shadow: 0 0 10px #ff3333; } }
</style>
</head>
<body>

<div id="loader">INITIALIZING NEURAL NET...</div>

<canvas id="hud-display"></canvas>

<div id="hud-top">
    <div class="hud-group left">
        <div class="hud-btn" id="btn-record"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" /></svg></div>
        <div class="hud-btn" id="btn-pause">
            <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>
            <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z" /></svg>
        </div>
    </div>
    <div class="hud-group center"><span id="status-text">WAITING...</span></div>
    <div class="hud-group right">
        <div class="hud-btn" id="btn-mode">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 2V4H5V8H3V4C3 2.9 3.9 2 5 2H9M15 2H19C20.1 2 21 2.9 21 4V8H19V4H15V2M9 20V22H5C3.9 22 3 21.1 3 20V16H5V20H9M15 20H19V16H21V20C21 21.1 20.1 22 19 22H15V20M7 10H9V12H7V10M15 10H17V12H15V10M11 14H13V16H11V14M11 8H13V10H11V8Z"/></svg>
        </div>
        <div class="hud-btn" id="btn-fs"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></div>
    </div>
</div>

<div id="zone-left" class="joy-container"><canvas id="canvasLeft" class="joy-canvas"></canvas></div>
<div id="zone-right" class="joy-container"><canvas id="canvasRight" class="joy-canvas"></canvas></div>

<script>
/**
 * ============================================================================
 * ARCHITECTURE: SEPARATION OF CONCERNS (ROS2 FLU ALIGNED)
 * ============================================================================
 */

// ========================
// 1. CONFIG
// ========================
const CONFIG = {
    WS_URL: "ws://10.188.165.129:8765",
    SEND_RATE_MS: 12.5,
    GYRO_DEADZONE: 5,
    GYRO_ACTIVE_RANGE: 45,
    JOY_THUMB_RADIUS: 30,
    JOY_DEADZONE_RADIUS: 40,
    KEY_INPUT_MAGNITUDE: 0.75,
    HUD_COLOR: "rgba(0, 255, 65, 0.8)", 
    HUD_COLOR_FADE: "rgba(0, 255, 65, 0.3)",
    RETICLE_COLOR: "#ffffff",
    NUM_STARS: 150
};

// ========================
// 2. STATE
// ========================
const State = {
    flags: { record: false, pause: false, control_state: false },
    controlsActive: false,
    output: { x: 0, y: 0, z: 0, yaw: 0, roll: 0, pitch: 0 },
    keys: { w: false, a: false, s: false, d: false, q: false, e: false, 
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false, Shift: false },
    gyroBase: { roll: 0, pitch: 0 },
    gyroRaw: { beta: 0, gamma: 0, alpha: 0 },
    wsConnected: false
};

const MathUtil = {
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    round: (val) => Math.round(val * 100) / 100,
    getShortestDiff: (current, base) => {
        let diff = current - base;
        while (diff > 180) diff -= 360;
        while (diff < -180) diff += 360;
        return diff;
    },
    applyRadialDeadzone: (x, y, deadzoneThreshold) => {
        const mag = Math.sqrt(x*x + y*y);
        if (mag < deadzoneThreshold) return { x: 0, y: 0 };
        const activeMag = mag - deadzoneThreshold;
        const normalizedMag = activeMag / (1 - deadzoneThreshold);
        const scale = normalizedMag / mag; 
        return { x: x * scale, y: y * scale };
    }
};

// ========================
// 3. INPUT CONTROLLER
// ========================
class Joystick {
    constructor(canvasId, color) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
        this.color = color;
        this.touchId = null;
        this.val = { x: 0, y: 0 }; 
        this.external = { x: 0, y: 0 };
        this.resize();
        this.initEvents();
    }
    
    resize() {
        const rect = this.canvas.getBoundingClientRect();
        if (rect.width === 0) return;
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
        this.size = rect.width;
        this.center = this.size / 2;
        this.radius = this.size / 2;
        this.maxDist = this.radius - 35; 
        this.deadzoneRatio = CONFIG.JOY_DEADZONE_RADIUS / this.maxDist; 
        this.pos = { x: this.center, y: this.center };
        this.draw();
    }

    setExternalInput(x, y) {
        this.external = { x, y };
        if (this.touchId === null) {
            this.val = { x, y };
            this.pos.x = this.center + (x * this.maxDist);
            this.pos.y = this.center + (y * this.maxDist);
            this.draw(x !== 0 || y !== 0);
        }
    }

    initEvents() {
        const start = (e) => {
            e.preventDefault();
            InputController.activateGyro();
            if (this.touchId === null) {
                this.touchId = e.changedTouches[0].identifier;
                this.update(e.changedTouches[0]);
                InputController.checkActivity();
            }
        };
        const move = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) this.update(t);
        };
        const end = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) {
                this.touchId = null;
                this.reset();
                InputController.checkActivity();
            }
        };
        this.canvas.addEventListener("touchstart", start, {passive: false});
        this.canvas.addEventListener("touchmove", move, {passive: false});
        this.canvas.addEventListener("touchend", end, {passive: false});
        this.canvas.addEventListener("touchcancel", end, {passive: false});
    }

    update(touch) {
        const rect = this.canvas.getBoundingClientRect();
        const dx = (touch.clientX - rect.left) - this.center;
        const dy = (touch.clientY - rect.top) - this.center;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        let drawX = dx, drawY = dy;
        if (dist > this.maxDist) {
            const ratio = this.maxDist / dist;
            drawX *= ratio;
            drawY *= ratio;
        }
        this.pos.x = this.center + drawX;
        this.pos.y = this.center + drawY;
        this.val.x = drawX / this.maxDist;
        this.val.y = drawY / this.maxDist;
        this.draw(true);
    }

    reset() {
        if (this.external.x !== 0 || this.external.y !== 0) {
             this.setExternalInput(this.external.x, this.external.y);
        } else {
            this.pos = { x: this.center, y: this.center };
            this.val = { x: 0, y: 0 };
            this.draw(false);
        }
    }

    draw(active) {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.size, this.size);
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, this.radius - 2, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(0, 0, 65, 0.4)"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, CONFIG.JOY_DEADZONE_RADIUS, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(255, 255, 65, 0.5)"; 
        ctx.lineWidth = 1; 
        ctx.setLineDash([5, 5]); 
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, CONFIG.JOY_THUMB_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = active ? this.color : "rgba(0, 255, 65, 0.1)"; ctx.fill();
        ctx.strokeStyle = active ? "#fff" : "rgba(0, 255, 65, 0.6)"; ctx.lineWidth = 2; ctx.stroke();
    }
}

const InputController = {
    init: () => {
        InputController.bindButton("btn-record", () => {
            State.flags.record = !State.flags.record;
            document.getElementById("btn-record").classList.toggle("recording", State.flags.record);
            App.updateUIStatus();
        });

        InputController.bindButton("btn-pause", () => InputController.togglePause());
        InputController.bindButton("btn-mode", () => InputController.toggleArm());

        document.getElementById("btn-fs").addEventListener("click", () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{});
            else if (document.exitFullscreen) document.exitFullscreen();
        });

        window.addEventListener('keydown', (e) => {
            // Handle specific shortcut keys
            if (e.key === "Alt") {
                e.preventDefault();
                if (!e.repeat) InputController.togglePause();
                return;
            } else if (e.key === "Control") {
                e.preventDefault();
                if (!e.repeat) InputController.toggleArm();
                return;
            }
            InputController.handleKey(e, true);
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === "Alt" || e.key === "Control") return;
            InputController.handleKey(e, false);
        });

        window.addEventListener("deviceorientation", e => {
            State.gyroRaw.beta = e.beta || 0;
            State.gyroRaw.gamma = e.gamma || 0;
            State.gyroRaw.alpha = e.alpha || 0;
        });

        InputController.stickLeft = new Joystick("canvasLeft", "rgba(0, 255, 65, 0.8)");
        InputController.stickRight = new Joystick("canvasRight", "rgba(0, 255, 65, 0.8)");
        window.addEventListener('resize', () => {
            InputController.stickLeft.resize();
            InputController.stickRight.resize();
        });
    },

    togglePause: () => {
        State.flags.pause = !State.flags.pause;
        const btn = document.getElementById("btn-pause");
        btn.classList.toggle("paused", State.flags.pause);
        document.getElementById("icon-pause").style.display = State.flags.pause ? "none" : "block";
        document.getElementById("icon-play").style.display = State.flags.pause ? "block" : "none";
        App.updateUIStatus();
    },

    toggleArm: () => {
        State.flags.control_state = !State.flags.control_state;
        document.getElementById("btn-mode").classList.toggle("active", State.flags.control_state);
        App.updateUIStatus();
    },

    bindButton: (id, callback) => {
        const el = document.getElementById(id);
        const handlePress = (e) => {
            if(e.type === 'touchstart' && e.cancelable) e.preventDefault();
            e.stopPropagation();
            el.classList.add('btn-active');
            callback();
        };
        const handleRelease = () => el.classList.remove('btn-active');
        el.addEventListener("touchstart", handlePress, {passive: false});
        el.addEventListener("touchend", handleRelease, {passive: false});
        el.addEventListener("mousedown", handlePress);
        el.addEventListener("mouseup", handleRelease);
        el.addEventListener("mouseleave", handleRelease);
    },

    handleKey: (e, isDown) => {
        const k = e.key.toLowerCase();
        const mappedKey = k === ' ' ? 'Space' : (e.key === 'Shift' ? 'Shift' : k);
        let finalKey = e.key.startsWith('Arrow') ? e.key : mappedKey;
        
        if (State.keys.hasOwnProperty(finalKey)) {
            State.keys[finalKey] = isDown;
            if (isDown && !State.controlsActive) {
                State.controlsActive = true;
                App.updateUIStatus();
            }
        }
    },

    activateGyro: () => {
        if (!State.controlsActive) {
            State.controlsActive = true;
            State.gyroBase.roll = State.gyroRaw.beta;  
            State.gyroBase.pitch = State.gyroRaw.gamma;
        }
    },

    checkActivity: () => {
        const active = InputController.stickLeft.touchId !== null || InputController.stickRight.touchId !== null;
        if (State.controlsActive !== active && !Object.values(State.keys).some(v=>v)) {
            State.controlsActive = active;
            App.updateUIStatus();
        }
    },

    processLogicLoop: () => {
        let joyLeftX = 0, joyLeftY = 0;
        if (State.keys.w) joyLeftY -= CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.s) joyLeftY += CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.q) joyLeftX -= CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.e) joyLeftX += CONFIG.KEY_INPUT_MAGNITUDE; 
        InputController.stickLeft.setExternalInput(joyLeftX, joyLeftY);

        let joyRightX = 0, joyRightY = 0;
        if (State.keys.Space) joyRightY -= CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.Shift) joyRightY += CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.a) joyRightX -= CONFIG.KEY_INPUT_MAGNITUDE; 
        if (State.keys.d) joyRightX += CONFIG.KEY_INPUT_MAGNITUDE; 
        InputController.stickRight.setExternalInput(joyRightX, joyRightY);

        const leftOut = MathUtil.applyRadialDeadzone(InputController.stickLeft.val.x, InputController.stickLeft.val.y, InputController.stickLeft.deadzoneRatio);
        const rightOut = MathUtil.applyRadialDeadzone(InputController.stickRight.val.x, InputController.stickRight.val.y, InputController.stickRight.deadzoneRatio);

        // MAP TO ROS2 FLU
        State.output.x = -leftOut.y;
        State.output.y = -leftOut.x;
        State.output.z = -rightOut.y; 
        State.output.yaw = -rightOut.x;

        if (State.controlsActive) {
            let usingKeys = false, keyRoll = 0, keyPitch = 0;
            // FLU: Nose down = +Pitch, Right wing down = +Roll
            if (State.keys.ArrowUp) { keyPitch = 1; usingKeys = true; } 
            if (State.keys.ArrowDown) { keyPitch = -1; usingKeys = true; } 
            if (State.keys.ArrowLeft) { keyRoll = -1; usingKeys = true; } 
            if (State.keys.ArrowRight) { keyRoll = 1; usingKeys = true; } 
            
            if (usingKeys) {
                State.output.roll = keyRoll;
                State.output.pitch = keyPitch;
            } else {
                let rDiff = MathUtil.getShortestDiff(State.gyroRaw.beta, State.gyroBase.roll);
                let pDiff = MathUtil.getShortestDiff(State.gyroRaw.gamma, State.gyroBase.pitch);
                
                State.output.roll = Math.abs(rDiff) < CONFIG.GYRO_DEADZONE ? 0 : 
                    Math.sign(rDiff) * ((Math.abs(rDiff) - CONFIG.GYRO_DEADZONE) / CONFIG.GYRO_ACTIVE_RANGE);
                
                State.output.pitch = Math.abs(pDiff) < CONFIG.GYRO_DEADZONE ? 0 : 
                    Math.sign(pDiff) * ((Math.abs(pDiff) - CONFIG.GYRO_DEADZONE) / CONFIG.GYRO_ACTIVE_RANGE);
            }
            State.output.roll = MathUtil.clamp(State.output.roll, -1, 1);
            State.output.pitch = MathUtil.clamp(State.output.pitch, -1, 1);
        } else {
            State.output.roll = 0;
            State.output.pitch = 0;
        }
    }
};

// ========================
// 4. COMMS CONTROLLER
// ========================
const CommsController = {
    ws: null,
    init: () => {
        CommsController.connect();
        setInterval(CommsController.sendData, CONFIG.SEND_RATE_MS);
    },
    connect: () => {
        CommsController.ws = new WebSocket(CONFIG.WS_URL);
        CommsController.ws.onopen = () => { State.wsConnected = true; App.updateUIStatus(); };
        CommsController.ws.onclose = () => { 
            State.wsConnected = false; 
            App.updateUIStatus();
            setTimeout(CommsController.connect, 1000);
        };
        CommsController.ws.onerror = () => { CommsController.ws.close(); };
    },
    sendData: () => {
        if (State.wsConnected && CommsController.ws.readyState === WebSocket.OPEN) {
            CommsController.ws.send(JSON.stringify({
                x: MathUtil.round(State.output.x),
                y: MathUtil.round(State.output.y),
                z: MathUtil.round(State.output.z),
                yaw: MathUtil.round(State.output.yaw),
                roll: MathUtil.round(State.output.roll),
                pitch: MathUtil.round(State.output.pitch),
                record: State.flags.record,
                pause: State.flags.pause,
                control_state: State.flags.control_state
            }));
        }
    }
};

// ========================
// 5. HUD RENDERER
// ========================
const HUDRenderer = {
    canvas: null, ctx: null, w: 0, h: 0, cx: 0, cy: 0, scale: 1,
    stars: [],

    init: () => {
        HUDRenderer.canvas = document.getElementById("hud-display");
        HUDRenderer.ctx = HUDRenderer.canvas.getContext("2d");
        
        for(let i=0; i<CONFIG.NUM_STARS; i++) {
            HUDRenderer.stars.push(HUDRenderer.spawnStar(true));
        }

        HUDRenderer.resize();
        window.addEventListener('resize', HUDRenderer.resize);
        requestAnimationFrame(HUDRenderer.renderLoop);
    },

    spawnStar: (randomZ = false) => {
        return {
            x: (Math.random() - 0.5) * 4000,
            y: (Math.random() - 0.5) * 4000,
            z: randomZ ? Math.random() * 3000 : 3000
        };
    },

    resize: () => {
        if(!HUDRenderer.canvas) return;
        HUDRenderer.w = HUDRenderer.canvas.width = window.innerWidth;
        HUDRenderer.h = HUDRenderer.canvas.height = window.innerHeight;
        HUDRenderer.cx = HUDRenderer.w / 2;
        HUDRenderer.cy = HUDRenderer.h / 2;
        HUDRenderer.scale = Math.min(HUDRenderer.w, HUDRenderer.h) / 800; 
    },

    renderLoop: () => {
        const { ctx, w, h, cx, cy, scale, stars } = HUDRenderer;
        ctx.clearRect(0, 0, w, h);
        
        // --- A. 3D STARFIELD DYNAMICS ---
        const vX = State.output.x * 60; 
        const vY = State.output.y * 30; 
        const vZ = State.output.z * 30; 
        
        const rYaw = -State.output.yaw * 0.01; 
        const rPitch = State.output.pitch * 0.05;

        ctx.fillStyle = "rgba(0, 255, 255, 0.8)"; // Teal Stars
        
        for (let i = 0; i < stars.length; i++) {
            let star = stars[i];

            star.z -= vX; 
            star.x += vY; 
            star.y += vZ; 

            if (rYaw !== 0) {
                let cosY = Math.cos(rYaw), sinY = Math.sin(rYaw);
                let nx = star.x * cosY - star.z * sinY;
                let nz = star.x * sinY + star.z * cosY;
                star.x = nx; star.z = nz;
            }
            if (rPitch !== 0) {
                let cosP = Math.cos(rPitch), sinP = Math.sin(rPitch);
                let ny = star.y * cosP - star.z * sinP;
                let nz = star.y * sinP + star.z * cosP;
                star.y = ny; star.z = nz;
            }

            // Infinite Panning Wrap
            if (star.x > 2000) star.x -= 4000;
            else if (star.x < -2000) star.x += 4000;
            
            if (star.y > 2000) star.y -= 4000;
            else if (star.y < -2000) star.y += 4000;

            if (star.z <= 10) stars[i] = HUDRenderer.spawnStar(); 
            else if (star.z > 4000) star.z = 10; 
            
            const fov = 600;
            const pX = cx + (star.x / star.z) * fov;
            const pY = cy + (star.y / star.z) * fov;
            
            // Scaled teal dots, max 20px
            const size = Math.max(1, (1 - star.z/4000) * 10 * scale);
            
            if (pX > 0 && pX < w && pY > 0 && pY < h) {
                ctx.beginPath();
                if (Math.abs(vX) > 5) {
                    const tailZ = star.z + vX;
                    if (tailZ > 10) {
                        const tailX = cx + (star.x / tailZ) * fov;
                        const tailY = cy + (star.y / tailZ) * fov;
                        ctx.moveTo(pX, pY);
                        ctx.lineTo(tailX, tailY);
                        ctx.strokeStyle = "rgba(0, 255, 255, 0.7)"; 
                        ctx.lineWidth = size;
                        ctx.stroke();
                        continue;
                    }
                } 
                ctx.arc(pX, pY, size, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // --- B. STATIC HUD ELEMENTS ---
        ctx.strokeStyle = CONFIG.HUD_COLOR;
        ctx.lineWidth = 2 * scale;
        
        ctx.beginPath();
        ctx.moveTo(cx - 15*scale, cy); ctx.lineTo(cx + 15*scale, cy);
        ctx.moveTo(cx, cy - 15*scale); ctx.lineTo(cx, cy + 15*scale);
        ctx.stroke();

        const innerRadius = 250 * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, innerRadius, Math.PI*1.15, Math.PI*1.85);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, innerRadius, Math.PI*0.15, Math.PI*0.85);
        ctx.stroke();

        // --- C. DYNAMIC RETICLE ---
        ctx.save();
        
        let tX = -State.output.yaw * innerRadius; 
        let tY = State.output.pitch * innerRadius; 
        
        let mag = Math.sqrt(tX*tX + tY*tY);
        let maxAllowedRadius = innerRadius * 0.85;
        if (mag > maxAllowedRadius) {
            tX = (tX / mag) * maxAllowedRadius;
            tY = (tY / mag) * maxAllowedRadius;
        }

        ctx.translate(cx + tX, cy + tY);
        
        const rot = State.output.roll * (Math.PI / 2);
        ctx.rotate(rot);

        ctx.strokeStyle = CONFIG.RETICLE_COLOR; 
        ctx.lineWidth = 3 * scale;
        ctx.shadowColor = CONFIG.HUD_COLOR;
        ctx.shadowBlur = 15;
        
        ctx.beginPath();
        ctx.moveTo(-30*scale, -15*scale);
        ctx.lineTo(-50*scale, -15*scale);
        ctx.lineTo(-50*scale, 15*scale);
        ctx.lineTo(-30*scale, 15*scale);
        
        ctx.moveTo(30*scale, -15*scale);
        ctx.lineTo(50*scale, -15*scale);
        ctx.lineTo(50*scale, 15*scale);
        ctx.lineTo(30*scale, 15*scale);
        
        ctx.moveTo(-12*scale, -5*scale);
        ctx.lineTo(0, -15*scale);
        ctx.lineTo(12*scale, -5*scale);
        
        ctx.stroke();
        ctx.restore();

        // --- D. TELEMETRY READOUT ---
        ctx.fillStyle = CONFIG.HUD_COLOR;
        ctx.font = `bold ${14 * Math.max(1, scale)}px Consolas`;
        ctx.textAlign = "center";
        
        const fmt = (val) => (val >= 0 ? "+" : "") + val.toFixed(2);
        const hudText = `[ FLU | X:${fmt(State.output.x)} Y:${fmt(State.output.y)} Z:${fmt(State.output.z)} | P:${fmt(State.output.pitch)} R:${fmt(State.output.roll)} Yw:${fmt(State.output.yaw)} ]`;
        
        ctx.fillText(hudText, cx, h - (30 * scale));

        requestAnimationFrame(HUDRenderer.renderLoop);
    }
};

// ========================
// 6. APP BOOTSTRAP
// ========================
const App = {
    init: () => {
        try {
            InputController.init();
            HUDRenderer.init();
            CommsController.init();
            
            setInterval(InputController.processLogicLoop, CONFIG.SEND_RATE_MS);

            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        } catch (e) {
            console.error("Boot failed", e);
            document.getElementById('loader').innerText = "BOOT ERROR. RELOADING...";
            setTimeout(() => location.reload(), 1000);
        }
    },

    updateUIStatus: () => {
        const statusEl = document.getElementById("status-text");
        if (!State.wsConnected) {
            statusEl.innerText = "NO SIGNAL";
            statusEl.style.color = "#ffaa00";
        } else if (State.flags.pause) {
            statusEl.innerText = "STANDBY";
            statusEl.style.color = "#ffaa00";
        } else if (State.flags.record) {
            statusEl.innerText = "RECORDING";
            statusEl.style.color = "#ff3333";
        } else if (State.controlsActive) {
            statusEl.innerText = "LINK ACTIVE";
            statusEl.style.color = "#00f3ff";
        } else {
            statusEl.innerText = "SYS READY";
            statusEl.style.color = "#00ff41";
        }
    }
};

window.addEventListener('load', App.init);
setTimeout(() => { if (document.getElementById('loader')) location.reload(); }, 3000);

</script>
</body>
