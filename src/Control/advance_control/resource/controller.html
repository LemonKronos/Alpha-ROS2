<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
<title>Alpha Control Minus 2 [V12 Scaled]</title>
<style>
    /* === CORE UI: SCI-FI GREEN === */
    body {
        background-color: #050505;
        color: #00ff41; /* Neon Green */
        font-family: 'Consolas', 'Courier New', monospace;
        margin: 0;
        overflow: hidden;
        touch-action: none; 
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        user-select: none;
        -webkit-user-select: none;
        
        /* Subtle Grid Background */
        background-image: 
            linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
    }

    /* === LOADING OVERLAY === */
    #loader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #00ff41;
        font-size: 24px;
        letter-spacing: 4px;
        text-shadow: 0 0 10px #00ff41;
        font-weight: bold;
        transition: opacity 0.5s;
    }

    /* === STATUS BAR === */
    #hud-top {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 50px;
        background: linear-gradient(to bottom, rgba(0, 20, 0, 0.95), rgba(0,0,0,0));
        border-bottom: 2px solid rgba(0, 255, 65, 0.3);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        padding: 0 15px;
        box-sizing: border-box;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.05);
    }

    .hud-group { display: flex; align-items: center; gap: 20px; }
    .hud-group.center { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

    /* === BUTTONS === */
    .hud-btn {
        background: rgba(0, 20, 0, 0.6);
        border: 1px solid #00ff41;
        border-radius: 4px; 
        width: 40px; height: 40px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer;
        fill: #00ff41;
        box-shadow: 0 0 5px rgba(0, 255, 65, 0.1);
        transition: all 0.1s; 
        pointer-events: auto; 
        -webkit-tap-highlight-color: transparent;
    }
    
    /* Visual Feedback for Press */
    .hud-btn.btn-active, .hud-btn:active { 
        background: rgba(0, 255, 65, 0.3); 
        box-shadow: 0 0 15px #00ff41;
        transform: scale(0.95); 
        border-color: #fff;
        fill: #fff;
    }
    
    #btn-record.recording {
        border-color: #ff3333; fill: #ff3333;
        background: rgba(255, 0, 0, 0.1);
        box-shadow: 0 0 10px #ff3333;
        animation: pulse 1.5s infinite;
    }
    #btn-pause.paused { fill: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
    
    /* ARMED STATE (BLUE) */
    #btn-mode.active {
        fill: #00f3ff !important;
        border-color: #00f3ff !important;
        box-shadow: 0 0 10px #00f3ff !important;
        background: rgba(0, 243, 255, 0.15) !important;
    }

    #status-text {
        font-size: 16px; letter-spacing: 3px;
        text-shadow: 0 0 8px #00ff41; font-weight: bold;
        text-transform: uppercase;
    }

    /* === FLIGHT HUD (Background Layer) === */
    #hud-display {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 10; /* Behind joysticks (50), On top of BG */
        pointer-events: none; /* Let touches pass through */
    }

    /* === JOYSTICKS === */
    .joy-container {
        position: absolute;
        bottom: 10%; 
        height: 60vh; width: 60vh;  
        max-width: 45vw; max-height: 45vw; 
        z-index: 50;
    }
    #zone-left { left: 6vw; }
    #zone-right { right: 6vw; }

    canvas.joy-canvas {
        width: 100%; height: 100%; display: block;
        border-radius: 50%;
        background: 
            radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 60%),
            linear-gradient(0deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%),
            linear-gradient(90deg, transparent 49%, rgba(0, 255, 65, 0.2) 50%, transparent 51%);
        border: 1px solid rgba(0, 255, 65, 0.3);
        box-shadow: 0 0 15px rgba(0, 255, 65, 0.1) inset;
    }

    @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 10px #ff3333; } 50% { opacity: 0.6; box-shadow: 0 0 2px #ff3333; } 100% { opacity: 1; box-shadow: 0 0 10px #ff3333; } }
</style>
</head>
<body>

<div id="loader">INITIALIZING SYSTEMS...</div>

<!-- FLIGHT HUD LAYER -->
<canvas id="hud-display"></canvas>

<div id="hud-top">
    <div class="hud-group left">
        <div class="hud-btn" id="btn-record"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" /></svg></div>
        <div class="hud-btn" id="btn-pause">
            <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>
            <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" style="display:none"><path d="M8 5v14l11-7z" /></svg>
        </div>
    </div>
    <div class="hud-group center"><span id="status-text">WAITING...</span></div>
    <div class="hud-group right">
        <div class="hud-btn" id="btn-mode">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 2V4H5V8H3V4C3 2.9 3.9 2 5 2H9M15 2H19C20.1 2 21 2.9 21 4V8H19V4H15V2M9 20V22H5C3.9 22 3 21.1 3 20V16H5V20H9M15 20H19V16H21V20C21 21.1 20.1 22 19 22H15V20M7 10H9V12H7V10M15 10H17V12H15V10M11 14H13V16H11V14M11 8H13V10H11V8Z"/></svg>
        </div>
        <div class="hud-btn" id="btn-fs"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></div>
    </div>
</div>

<div id="zone-left" class="joy-container"><canvas id="canvasLeft" class="joy-canvas"></canvas></div>
<div id="zone-right" class="joy-container"><canvas id="canvasRight" class="joy-canvas"></canvas></div>

<script>
// ========================
// CONFIGURATION
// ========================
const WS_URL = "ws://10.183.21.129:8765";
const SEND_RATE_MS = 12.5; 

// Gyro Config
const GYRO_DEADZONE = 5; 
const GYRO_ACTIVE_RANGE = 45; 

// Joystick Config
const JOY_THUMB_RADIUS = 30; 
const JOY_DEADZONE_RADIUS = 40; 
const KEY_INPUT_MAGNITUDE = 0.75; // Clamped keyboard input

// ========================
// SYSTEM BOOT
// ========================
window.addEventListener('load', () => {
    try {
        initApp();
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
    } catch (e) {
        console.error("Boot failed", e);
        document.getElementById('loader').innerText = "BOOT ERROR. RELOADING...";
        setTimeout(() => location.reload(), 1000);
    }
});

setTimeout(() => {
    if (document.getElementById('loader')) location.reload(); 
}, 3000); 

// ========================
// APP LOGIC
// ========================
let stickLeft, stickRight;
let ws;
let hudCtx;
let hudCanvas;

// Global State
let flags = { 
    record: false, 
    pause: false, 
    control_state: false 
};
let controlsActive = false;
let gyroBase = { roll: 0, pitch: 0 }; 
let gyroRaw = { beta: 0, gamma: 0, alpha: 0 }; 
let output = { x: 0, y: 0, z: 0, yaw: 0, roll: 0, pitch: 0 }; 

// Keyboard State
let keys = {
    w: false, a: false, s: false, d: false,
    q: false, e: false,
    ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
    Space: false, Shift: false
};

function initApp() {
    
    // --- UI Setup ---
    const btnRecord = document.getElementById("btn-record");
    const btnPause = document.getElementById("btn-pause");
    const btnFs = document.getElementById("btn-fs");
    const btnMode = document.getElementById("btn-mode");
    
    // --- HUD Setup ---
    hudCanvas = document.getElementById("hud-display");
    hudCtx = hudCanvas.getContext("2d");
    resizeHud();
    window.addEventListener('resize', resizeHud);

    // Function to force update the UI status based on priority
    const updateGlobalStatus = () => {
        const statusEl = document.getElementById("status-text");
        
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            statusEl.innerText = "DISCONNECTED";
            statusEl.style.color = "#ffaa00";
            return;
        }
        if (flags.pause) {
            statusEl.innerText = "PAUSED";
            statusEl.style.color = "#ffaa00";
            return;
        }
        if (flags.record) {
            statusEl.innerText = "REC ●";
            statusEl.style.color = "#ff3333";
            return;
        }
        if (controlsActive) {
            statusEl.innerText = "ACTIVE";
            statusEl.style.color = "#00ff41";
            return;
        }
        statusEl.innerText = "READY";
        statusEl.style.color = "#00f3ff";
    };

    // Helper: Handles BOTH Mouse (Laptop) and Touch (Mobile)
    const addInputListener = (el, callback) => {
        const handlePress = (e) => {
            if(e.type === 'touchstart' && e.cancelable) e.preventDefault();
            e.stopPropagation();
            el.classList.add('btn-active');
            callback();
        };
        const handleRelease = (e) => {
            el.classList.remove('btn-active');
        };
        el.addEventListener("touchstart", handlePress, {passive: false});
        el.addEventListener("touchend", handleRelease, {passive: false});
        el.addEventListener("touchcancel", handleRelease, {passive: false});
        el.addEventListener("mousedown", handlePress);
        el.addEventListener("mouseup", handleRelease);
        el.addEventListener("mouseleave", handleRelease);
    };

    addInputListener(btnRecord, () => {
        flags.record = !flags.record;
        if (flags.record) btnRecord.classList.add("recording");         
        else btnRecord.classList.remove("recording");
        updateGlobalStatus();
    });

    addInputListener(btnPause, () => {
        flags.pause = !flags.pause;
        if (flags.pause) {
            btnPause.classList.add("paused");
            document.getElementById("icon-pause").style.display = "none";
            document.getElementById("icon-play").style.display = "block";
        } else {
            btnPause.classList.remove("paused");
            document.getElementById("icon-pause").style.display = "block";
            document.getElementById("icon-play").style.display = "none";
        }
        updateGlobalStatus();
    });

    addInputListener(btnMode, () => {
        flags.control_state = !flags.control_state;
        if (flags.control_state) btnMode.classList.add("active");
        else btnMode.classList.remove("active");
    });

    btnFs.addEventListener("click", () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{});
        else if (document.exitFullscreen) document.exitFullscreen();
    });

    // --- Keyboard Listeners ---
    window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        // Check both original key and lower case to catch Shift+Key nuances or caps lock
        const mappedKey = k === ' ' ? 'Space' : (e.key === 'Shift' ? 'Shift' : k);
        
        // Map arrow keys correctly (they don't have lowercase single letters)
        let finalKey = mappedKey;
        if (e.key.startsWith('Arrow')) finalKey = e.key;
        
        if (keys.hasOwnProperty(finalKey)) {
            keys[finalKey] = true;
            if (!controlsActive) {
                controlsActive = true;
                updateGlobalStatus();
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        const mappedKey = k === ' ' ? 'Space' : (e.key === 'Shift' ? 'Shift' : k);
        let finalKey = mappedKey;
        if (e.key.startsWith('Arrow')) finalKey = e.key;

        if (keys.hasOwnProperty(finalKey)) {
            keys[finalKey] = false;
        }
    });

    // --- WebSocket (Auto-Reconnect) ---
    function connect() {
        ws = new WebSocket(WS_URL);
        ws.onopen = () => { updateGlobalStatus(); };
        ws.onclose = () => { 
            updateGlobalStatus();
            setTimeout(connect, 1000);
        };
        ws.onerror = (e) => { ws.close(); };
    }
    connect();

    // --- Joysticks ---
    const onStickActivity = (isActive) => {
        controlsActive = isActive;
        updateGlobalStatus();
    };

    stickLeft = new Joystick("canvasLeft", "rgba(255, 160, 0, 0.8)", onStickActivity);
    stickRight = new Joystick("canvasRight", "rgba(0, 240, 255, 0.8)", onStickActivity);

    // --- Loop ---
    setInterval(() => gameLoop(flags, ws), SEND_RATE_MS);
    requestAnimationFrame(renderLoop); 
}

// ========================
// LOGIC HELPERS
// ========================

const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
const round = (val) => Math.round(val * 100) / 100;

function getShortestDiff(current, base) {
    let diff = current - base;
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    return diff;
}

function applyRadialDeadzone(x, y, deadzoneThreshold) {
    const mag = Math.sqrt(x*x + y*y);
    if (mag < deadzoneThreshold) {
        return { x: 0, y: 0 };
    } else {
        const activeMag = mag - deadzoneThreshold;
        const normalizedMag = activeMag / (1 - deadzoneThreshold);
        const scale = normalizedMag / mag; 
        return { x: x * scale, y: y * scale };
    }
}

// --- GYRO HANDLING ---
window.addEventListener("deviceorientation", e => {
    gyroRaw.beta = e.beta || 0;
    gyroRaw.gamma = e.gamma || 0;
    gyroRaw.alpha = e.alpha || 0;
});

function activateGyro() {
    if (!controlsActive) {
        controlsActive = true;
        gyroBase.roll = gyroRaw.beta;  
        gyroBase.pitch = gyroRaw.gamma;
    }
}

function resizeHud() {
    if(!hudCanvas) return;
    hudCanvas.width = window.innerWidth;
    hudCanvas.height = window.innerHeight;
}

// ========================
// RENDER LOOP (HUD)
// ========================
function renderLoop() {
    if (!hudCtx) return;
    const w = hudCanvas.width;
    const h = hudCanvas.height;
    const cx = w / 2;
    const cy = h / 2;
    
    // --- DYNAMIC SCALE FACTOR ---
    // All sizes are calculated relative to a reference height (e.g. 800px)
    // This ensures consistency across window sizes.
    const refH = 800; 
    const scale = Math.min(w, h) / refH; 
    
    hudCtx.clearRect(0, 0, w, h);
    hudCtx.lineWidth = 2 * scale;
    hudCtx.strokeStyle = "rgba(0, 255, 65, 0.6)";
    hudCtx.fillStyle = "rgba(0, 255, 65, 0.8)";
    hudCtx.font = `bold ${Math.max(12, 16 * scale)}px Consolas`;
    hudCtx.textAlign = "center";

    // --- 1. PITCH (Ladder) ---
    // Scaled parameters
    const maxPitchPx = h * 0.35; // Total travel distance
    const pitchOffset = -output.pitch * maxPitchPx; 
    const clipW = 240 * scale;
    const clipH = h * 0.7; // Keep clip relative to screen height to avoid clipping issues on resize
    
    hudCtx.save();
    hudCtx.beginPath();
    // Centered clip box
    hudCtx.rect(cx - clipW/2, cy - clipH/2, clipW, clipH);
    hudCtx.clip();

    const horizonY = cy + pitchOffset;
    const stepPx = maxPitchPx / 4; 
    
    for (let i = -4; i <= 4; i++) {
        const y = horizonY - (i * stepPx);
        const width = (i === 0) ? (200 * scale) : (i % 2 === 0 ? (120 * scale) : (60 * scale));
        
        hudCtx.beginPath();
        hudCtx.moveTo(cx - width/2, y);
        hudCtx.lineTo(cx + width/2, y);
        
        if (i === 0) {
            hudCtx.strokeStyle = "rgba(0, 255, 65, 0.9)";
            hudCtx.lineWidth = 3 * scale;
        } else {
            hudCtx.strokeStyle = "rgba(0, 255, 65, 0.4)";
            hudCtx.lineWidth = 1.5 * scale;
        }
        hudCtx.stroke();
    }
    
    // Pitch Value
    hudCtx.fillStyle = "#00f3ff";
    hudCtx.textAlign = "center"; 
    hudCtx.fillText(`Pitch: ${output.pitch.toFixed(2)}`, cx, cy + (40 * scale));
    
    // Center Ref (The "Plane")
    hudCtx.strokeStyle = "#00f3ff";
    hudCtx.lineWidth = 2 * scale;
    hudCtx.beginPath();
    hudCtx.moveTo(cx - (50 * scale), cy); 
    hudCtx.lineTo(cx - (20 * scale), cy); 
    hudCtx.lineTo(cx - (20 * scale), cy + (10 * scale));
    
    hudCtx.moveTo(cx + (50 * scale), cy); 
    hudCtx.lineTo(cx + (20 * scale), cy); 
    hudCtx.lineTo(cx + (20 * scale), cy + (10 * scale));
    hudCtx.stroke();
    hudCtx.beginPath(); 
    hudCtx.arc(cx, cy, 3 * scale, 0, Math.PI*2); 
    hudCtx.fill();
    hudCtx.restore();

    // --- 2. ROLL (Top Half Circle) ---
    const rollRadius = 200 * scale; 
    const rollCenterY = 300 * scale; // Moved down proportionally
    
    hudCtx.save();
    hudCtx.translate(cx, rollCenterY);

    // Roll Value
    hudCtx.fillStyle = "#00f3ff";
    hudCtx.textAlign = "center";
    hudCtx.fillText(`Roll: ${output.roll.toFixed(2)}`, 0, -rollRadius + (80 * scale));

    // Static Arc
    hudCtx.beginPath();
    hudCtx.arc(0, 0, rollRadius, Math.PI, 0); 
    hudCtx.strokeStyle = "rgba(0, 255, 65, 0.4)";
    hudCtx.lineWidth = 3 * scale;
    hudCtx.stroke();
    
    // Static Ticks
    for (let ang = 180; ang >= 0; ang -= 15) {
        const rad = ang * (Math.PI / 180);
        const rInner = (ang % 45 === 0) ? rollRadius - (20 * scale) : rollRadius - (10 * scale);
        const x1 = Math.cos(rad) * rollRadius;
        const y1 = Math.sin(rad) * rollRadius;
        const x2 = Math.cos(rad) * rInner;
        const y2 = Math.sin(rad) * rInner;
        hudCtx.beginPath();
        hudCtx.moveTo(x1, -y1); 
        hudCtx.lineTo(x2, -y2);
        hudCtx.lineWidth = 2 * scale;
        hudCtx.stroke();
    }

    // Moving Indicator
    const rollAngle = output.roll * (Math.PI / 2); 
    hudCtx.rotate(rollAngle); 
    hudCtx.fillStyle = "#00f3ff";
    hudCtx.beginPath();
    hudCtx.moveTo(0, -rollRadius + (25 * scale));
    hudCtx.lineTo(-(10 * scale), -rollRadius + (5 * scale));
    hudCtx.lineTo((10 * scale), -rollRadius + (5 * scale));
    hudCtx.fill();
    hudCtx.restore();

    // --- 3. YAW (Bottom Ruler) ---
    const rulerY = h - (80 * scale);
    const rulerWidth = w * 0.8;
    const tickSpacing = 40 * scale; 
    // Scale offset based on screen Width to maintain "speed" appearance
    const yawPixelOffset = output.yaw * (w * 0.3); 

    hudCtx.save();
    hudCtx.beginPath();
    hudCtx.rect(cx - rulerWidth/2, rulerY - (50 * scale), rulerWidth, 100 * scale);
    hudCtx.clip();

    // Background Line
    hudCtx.beginPath();
    hudCtx.moveTo(cx - rulerWidth/2, rulerY);
    hudCtx.lineTo(cx + rulerWidth/2, rulerY);
    hudCtx.strokeStyle = "rgba(0, 255, 65, 0.6)";
    hudCtx.lineWidth = 2 * scale;
    hudCtx.stroke();

    // Moving Ticks
    const numTicks = Math.ceil(rulerWidth / tickSpacing) + 4;
    for (let i = -10; i <= 10; i++) {
        let xPos = cx + (i * tickSpacing) - yawPixelOffset;
        // Optimization: Don't draw if clearly out of bounds
        if (xPos > 0 && xPos < w) {
            hudCtx.beginPath();
            hudCtx.moveTo(xPos, rulerY);
            let hTick = (i === 0) ? (20 * scale) : (i % 5 === 0 ? (15 * scale) : (8 * scale));
            hudCtx.lineTo(xPos, rulerY - hTick);
            hudCtx.stroke();
        }
    }
    hudCtx.restore();

    // Yaw Value
    hudCtx.fillStyle = "#00f3ff";
    hudCtx.textAlign = "center";
    hudCtx.fillText(`Yaw: ${output.yaw.toFixed(2)}`, cx, rulerY - (40 * scale));

    // Static Center Marker
    hudCtx.fillStyle = "#00f3ff";
    hudCtx.beginPath();
    hudCtx.moveTo(cx, rulerY + (5 * scale));
    hudCtx.lineTo(cx - (8 * scale), rulerY + (18 * scale));
    hudCtx.lineTo(cx + (8 * scale), rulerY + (18 * scale));
    hudCtx.fill();

    requestAnimationFrame(renderLoop);
}

class Joystick {
    constructor(canvasId, color, statusCallback) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");
        this.color = color;
        this.statusCallback = statusCallback;
        this.touchId = null;
        this.maxDist = 0;
        this.deadzoneRatio = 0; 
        
        // Internal state for external override (Keyboard)
        this.externalX = 0;
        this.externalY = 0;

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.pos = { x: this.center, y: this.center };
        this.val = { x: 0, y: 0 }; 
        this.initEvents();
        this.draw();
    }
    
    setExternalInput(x, y) {
        // x, y are -1 to 1 normalized
        this.externalX = x;
        this.externalY = y;
        
        // If not touched, use external
        if (this.touchId === null) {
            this.val.x = x;
            this.val.y = y;
            
            // Map val back to visual pos
            this.pos.x = this.center + (x * this.maxDist);
            this.pos.y = this.center + (y * this.maxDist);
            this.draw(x !== 0 || y !== 0);
        }
    }

    resize() {
        const rect = this.canvas.getBoundingClientRect();
        if (rect.width === 0) return;
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
        this.size = rect.width;
        this.center = this.size / 2;
        this.radius = this.size / 2;
        this.maxDist = this.radius - 35; 
        this.deadzoneRatio = JOY_DEADZONE_RADIUS / this.maxDist; 
        this.pos = { x: this.center, y: this.center };
        this.draw();
    }

    initEvents() {
        const start = (e) => {
            e.preventDefault();
            activateGyro();
            if (this.touchId === null) {
                this.touchId = e.changedTouches[0].identifier;
                this.update(e.changedTouches[0]);
                this.statusCallback(true);
            }
        };
        const move = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) this.update(t);
        };
        const end = (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) if (t.identifier === this.touchId) {
                this.touchId = null;
                this.reset();
                if (stickLeft.touchId === null && stickRight.touchId === null) {
                    this.statusCallback(false);
                }
            }
        };
        this.canvas.addEventListener("touchstart", start, {passive: false});
        this.canvas.addEventListener("touchmove", move, {passive: false});
        this.canvas.addEventListener("touchend", end, {passive: false});
        this.canvas.addEventListener("touchcancel", end, {passive: false});
    }

    update(touch) {
        const rect = this.canvas.getBoundingClientRect();
        const dx = (touch.clientX - rect.left) - this.center;
        const dy = (touch.clientY - rect.top) - this.center;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        let drawX = dx, drawY = dy;
        if (dist > this.maxDist) {
            const ratio = this.maxDist / dist;
            drawX *= ratio;
            drawY *= ratio;
        }
        this.pos.x = this.center + drawX;
        this.pos.y = this.center + drawY;
        this.val.x = drawX / this.maxDist;
        this.val.y = drawY / this.maxDist;
        this.draw(true);
    }

    reset() {
        // If external input exists, revert to it
        if (this.externalX !== 0 || this.externalY !== 0) {
             this.setExternalInput(this.externalX, this.externalY);
        } else {
            this.pos.x = this.center;
            this.pos.y = this.center;
            this.val.x = 0;
            this.val.y = 0;
            this.draw(false);
        }
    }

    draw(active) {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.size, this.size);
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, this.radius - 2, 0, Math.PI*2);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(this.center, this.center, JOY_DEADZONE_RADIUS, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(0, 255, 65, 0.2)"; 
        ctx.lineWidth = 1; 
        ctx.setLineDash([5, 5]); 
        ctx.stroke();
        ctx.setLineDash([]); 

        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, JOY_THUMB_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = active ? this.color : "#444"; ctx.fill();
        ctx.strokeStyle = active ? "#fff" : "#666"; ctx.lineWidth = 2; ctx.stroke();
    }
}

// ========================
// GAME LOOP
// ========================
function gameLoop(flags, ws) {
    
    // 0. Update Virtual Joysticks from Keyboard
    // Clamped to 0.75 as requested
    let joyLeftX = 0;
    let joyLeftY = 0;
    if (keys.w) joyLeftY -= KEY_INPUT_MAGNITUDE; 
    if (keys.s) joyLeftY += KEY_INPUT_MAGNITUDE; 
    if (keys.q) joyLeftX -= KEY_INPUT_MAGNITUDE; 
    if (keys.e) joyLeftX += KEY_INPUT_MAGNITUDE; 
    
    stickLeft.setExternalInput(joyLeftX, joyLeftY);

    let joyRightX = 0;
    let joyRightY = 0;
    if (keys.Space) joyRightY -= KEY_INPUT_MAGNITUDE; 
    if (keys.Shift) joyRightY += KEY_INPUT_MAGNITUDE; 
    if (keys.a) joyRightX -= KEY_INPUT_MAGNITUDE; 
    if (keys.d) joyRightX += KEY_INPUT_MAGNITUDE; 
    
    stickRight.setExternalInput(joyRightX, joyRightY);

    // 1. Process Joystick Outputs
    const leftOut = applyRadialDeadzone(stickLeft.val.x, stickLeft.val.y, stickLeft.deadzoneRatio);
    const rightOut = applyRadialDeadzone(stickRight.val.x, stickRight.val.y, stickRight.deadzoneRatio);

    output.x = -leftOut.y;
    output.y = -leftOut.x;
    output.z = -rightOut.y; // Space maps to stickRight Up (-1) -> output.z = 1
    output.yaw = -rightOut.x;

    // 2. Gyro & Display Logic
    if (controlsActive) {
        
        // --- KEYBOARD OVERRIDE FOR PITCH/ROLL ---
        let usingKeysForAttitude = false;
        let keyRoll = 0; 
        let keyPitch = 0;
        
        if (keys.ArrowUp) { keyPitch = -1; usingKeysForAttitude = true; } 
        if (keys.ArrowDown) { keyPitch = 1; usingKeysForAttitude = true; } 
        if (keys.ArrowLeft) { keyRoll = -1; usingKeysForAttitude = true; } 
        if (keys.ArrowRight) { keyRoll = 1; usingKeysForAttitude = true; } 
        
        if (usingKeysForAttitude) {
            output.roll = keyRoll;
            output.pitch = keyPitch;
        } else {
            // Use Gyro
            let rollDiff = getShortestDiff(gyroRaw.beta, gyroBase.roll);
            let pitchDiff = getShortestDiff(gyroRaw.gamma, gyroBase.pitch);
            
            // Calculate Control Output (Normalized)
            if (Math.abs(rollDiff) < GYRO_DEADZONE) {
                output.roll = 0; 
            } else {
                let activeDiff = Math.abs(rollDiff) - GYRO_DEADZONE;
                output.roll = Math.sign(rollDiff) * (activeDiff / GYRO_ACTIVE_RANGE);
            }

            if (Math.abs(pitchDiff) < GYRO_DEADZONE) {
                output.pitch = 0; 
            } else {
                let activeDiff = Math.abs(pitchDiff) - GYRO_DEADZONE;
                output.pitch = Math.sign(pitchDiff) * (activeDiff / GYRO_ACTIVE_RANGE);
            }
        }

        output.roll = clamp(output.roll, -1, 1);
        output.pitch = clamp(output.pitch, -1, 1);
    } else {
        output.roll = 0;
        output.pitch = 0;
    }

    // 3. Send Data
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            x: round(output.x),
            y: round(output.y),
            z: round(output.z),
            yaw: round(output.yaw),
            roll: round(output.roll),
            pitch: round(output.pitch),
            record: flags.record,
            pause: flags.pause,
            control_state: flags.control_state
        }));
    }
}
